name: Deploy paper site

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  deployments: write

jobs:
  validate:
    uses: impact-scholars/isp-actions-config/.github/workflows/validate-paper.yml@v0.2.0

  preview:
    needs: validate
    if: github.event_name == 'pull_request'
    uses: impact-scholars/isp-actions-config/.github/workflows/build-and-deploy.yml@v0.2.0
    with:
      target: cloudflare
      base_url: ""
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    uses: impact-scholars/isp-actions-config/.github/workflows/build-and-deploy.yml@v0.2.0
    with:
      target: pages
      base_url: /${{ github.event.repository.name }}
